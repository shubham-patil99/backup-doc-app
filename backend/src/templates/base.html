<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            padding: 20px;
            background: url('bg.png') no-repeat center center;
            background-size: cover;
        }

        .content-wrapper {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        table, th, td {
            border: 1px solid #444;
        }

        th {
            background: #f0f0f0;
            font-weight: bold;
        }

        img {
            max-width: 100%;
        }

        h1, h2, h3 {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="content-wrapper">
        {{{content}}}
    </div>
</body>
</html>
